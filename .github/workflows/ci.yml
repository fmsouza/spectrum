# Shared verify gate — runs on every push to main + every PR. No builds: code verifications
# (typecheck/lint/test/audit + version sync) run independently of the canary/release build
# matrices (canary.yml, release.yml). The 3-OS matrix exercises the macOS keychain integration
# test and the Windows DPAPI-file keychain path.
name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu is the primary gate; macos additionally exercises the macOS-only
        # keychain integration test (the real `security` CLI), which skips on Linux;
        # windows exercises the DPAPI-file keychain path.
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun scripts/sync-workspace-versions.ts --check
      # Force serial typecheck on Windows: each package's `tsc --noEmit` writes
      # `tsconfig.tsbuildinfo` (composite project references), and turbo's
      # default parallel execution races those writes on Windows file locks,
      # causing one of the parallel `tsc` invocations to exit non-zero (or
      # Bun's process to crash with STATUS_DLL_INIT_FAILED mid-startup).
      # macOS/Linux are unaffected and keep full parallelism.
      - name: Run typecheck
        run: bun run typecheck
        env:
          TURBO_CONCURRENCY: ${{ matrix.os == 'windows-latest' && '1' || '' }}
      - run: bun run lint
      - run: bun test
      - run: bun audit
