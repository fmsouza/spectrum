name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test
      - run: bun audit

  build:
    name: Build (${{ matrix.name }})
    needs: gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            asset: spectrum-darwin-arm64
            archive: tar.gz
            app: true
          - name: macOS x64
            # macos-13 (Intel) was retired by GitHub on 2025-12-04; macos-15-intel
            # is the replacement x86_64 label (Intel support ends Fall 2027).
            os: macos-15-intel
            asset: spectrum-darwin-x64
            archive: tar.gz
            app: true
          - name: Linux x64
            os: ubuntu-latest
            asset: spectrum-linux-x64
            archive: tar.gz
            app: true
          - name: Linux arm64
            os: ubuntu-24.04-arm
            asset: spectrum-linux-arm64
            archive: tar.gz
            app: true
          - name: Windows x64
            os: windows-latest
            asset: spectrum-windows-x64
            archive: zip
            app: true
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile

      - name: Compile CLI binary
        run: bun run --filter spectrum compile

      - name: Set up macOS signing
        if: matrix.app && runner.os == 'macOS'
        shell: bash
        # Reads the signing material straight from GitHub Secrets (a composite action
        # cannot access the `secrets` context, so this lives inline in the workflow).
        # Imports the Developer ID cert into a temp keychain and exports the env vars
        # Electrobun reads at sign/notarize time. The keychain is torn down by the
        # "Clean up signing keychain" step (if: always()).
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          # Preflight — every signing secret must be present (channel builds must be signed).
          missing=()
          [ -n "${CERT_P12_BASE64:-}" ]   || missing+=(MACOS_CERTIFICATE_P12_BASE64)
          [ -n "${CERT_PASSWORD:-}" ]     || missing+=(MACOS_CERTIFICATE_PASSWORD)
          [ -n "${SIGN_IDENTITY:-}" ]     || missing+=(MACOS_SIGN_IDENTITY)
          [ -n "${KEYCHAIN_PASSWORD:-}" ] || missing+=(MACOS_KEYCHAIN_PASSWORD)
          [ -n "${API_KEY_P8_BASE64:-}" ] || missing+=(APPLE_API_KEY_P8_BASE64)
          [ -n "${API_KEY_ID:-}" ]        || missing+=(APPLE_API_KEY_ID)
          [ -n "${API_ISSUER_ID:-}" ]     || missing+=(APPLE_API_ISSUER_ID)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::macOS signing secrets missing: ${missing[*]}. Channel builds must be signed — failing."
            exit 1
          fi
          # Import the Developer ID certificate into a temporary keychain.
          KEYCHAIN_PATH="$RUNNER_TEMP/spectrum-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          printf '%s' "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          # Put the temp keychain first in the user search list + make it default so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[”"]//g')
          security default-keychain -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"
          # Write the App Store Connect API key + export the signing env for the build + cleanup steps.
          API_KEY_PATH="$RUNNER_TEMP/asc-api-key.p8"
          printf '%s' "$API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          {
            echo "SPECTRUM_SIGNING_KEYCHAIN=$KEYCHAIN_PATH"
            echo "ELECTROBUN_DEVELOPER_ID=$SIGN_IDENTITY"
            echo "ELECTROBUN_APPLEAPIKEYPATH=$API_KEY_PATH"
            echo "ELECTROBUN_APPLEAPIKEY=$API_KEY_ID"
            echo "ELECTROBUN_APPLEAPIISSUER=$API_ISSUER_ID"
          } >> "$GITHUB_ENV"

      - name: Build desktop app (stable channel, for distribution + update artifacts)
        id: app
        if: matrix.app
        # Hard gate: a release must ship a buildable channel bundle. Built on a clean
        # checkout (the dev/smoke build runs LAST, so build/ + artifacts/ here hold only
        # the channel outputs the staging steps publish — and no smoked-app file lock can
        # break a `rm`). Confirmed (Task 12): `--env=<channel>` selects the build
        # environment; build:stable runs `electrobun build --env=stable`, emitting
        # artifacts prefixed `stable-<os>-<arch>-…`.
        run: bun run --filter spectrum build:stable

      - name: Verify macOS signing + notarization (hard gate)
        if: matrix.app && runner.os == 'macOS' && steps.app.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          DMG=$(find apps/desktop/artifacts -maxdepth 2 -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No .dmg in apps/desktop/artifacts/ — the channel build produced no macOS installer."
            ls -la apps/desktop/artifacts/ || true
            exit 1
          fi
          echo "Verifying installer: $DMG"

          # 1. The DMG carries a valid Developer ID signature (not adhoc/unsigned).
          codesign --verify --verbose=2 "$DMG"
          codesign -dvvv "$DMG" 2>&1 | tee /tmp/dmg-codesign.txt
          grep -q "Authority=Developer ID Application" /tmp/dmg-codesign.txt \
            || { echo "::error::DMG is not signed with a Developer ID Application identity."; exit 1; }

          # 2. The DMG has a stapled notarization ticket.
          xcrun stapler validate "$DMG"

          # 3. Mount the DMG and fully verify the inner .app.
          MNT=$(mktemp -d)
          hdiutil attach "$DMG" -nobrowse -mountpoint "$MNT" >/dev/null
          trap 'hdiutil detach "$MNT" >/dev/null 2>&1 || true' EXIT
          APP=$(find "$MNT" -maxdepth 1 -name '*.app' | head -1)
          if [ -z "$APP" ]; then echo "::error::No .app inside the DMG."; exit 1; fi
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -dvvv "$APP" 2>&1 | grep -q "Authority=Developer ID Application" \
            || { echo "::error::App inside the DMG is not Developer ID signed."; exit 1; }
          spctl -a -t exec -vvv "$APP" 2>&1 | tee /tmp/app-spctl.txt
          grep -q "source=Notarized Developer ID" /tmp/app-spctl.txt \
            || { echo "::error::Gatekeeper did not accept the app as Notarized Developer ID."; exit 1; }
          xcrun stapler validate "$APP"
          echo "✓ macOS installer is signed + notarized + stapled"

      - name: Stage artifacts (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage update-feed
          # CLI archive (kept as a standalone download).
          cp apps/desktop/dist/spectrum-cli "stage/${{ matrix.asset }}-cli"
          tar czf "stage/${{ matrix.asset }}-cli.tar.gz" -C stage "${{ matrix.asset }}-cli"
          rm -f "stage/${{ matrix.asset }}-cli"
          # OS installer replaces the old raw app bundle: macOS *.dmg, Linux *-Setup.tar.gz.
          if [ "${{ steps.app.outcome }}" = "success" ]; then
            shopt -s nullglob
            installers=(apps/desktop/artifacts/*.dmg apps/desktop/artifacts/*-Setup.tar.gz)
            if [ ${#installers[@]} -eq 0 ]; then
              echo "::error::No OS installer (*.dmg / *-Setup.tar.gz) in apps/desktop/artifacts/"
              ls -la apps/desktop/artifacts/ || true
              exit 1
            fi
            for f in "${installers[@]}"; do cp "$f" stage/; done
          fi

      - name: Stage artifacts (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path stage, update-feed | Out-Null
          # CLI archive (kept as a standalone download).
          Copy-Item "apps/desktop/dist/spectrum-cli.exe" "stage/${{ matrix.asset }}-cli.exe" -ErrorAction SilentlyContinue
          if (-not (Test-Path "stage/${{ matrix.asset }}-cli.exe")) {
            Copy-Item "apps/desktop/dist/spectrum-cli" "stage/${{ matrix.asset }}-cli.exe"
          }
          Compress-Archive "stage/${{ matrix.asset }}-cli.exe" "stage/${{ matrix.asset }}-cli.zip"
          Remove-Item "stage/${{ matrix.asset }}-cli.exe"
          # OS installer: Windows self-extracting installer, wrapped in a zip by Electrobun.
          if ("${{ steps.app.outcome }}" -eq "success") {
            $installers = Get-ChildItem "apps/desktop/artifacts" -Filter "*-Setup*.zip" -ErrorAction SilentlyContinue
            if (-not $installers) {
              Write-Error "No Windows installer (*-Setup*.zip) in apps/desktop/artifacts/"
              Get-ChildItem "apps/desktop/artifacts" -ErrorAction SilentlyContinue | Format-Table
              exit 1
            }
            foreach ($f in $installers) { Copy-Item $f.FullName "stage/" }
          }

      - name: Stage update artifacts (auto-update feed → update-feed/)
        if: matrix.app && steps.app.outcome == 'success'
        shell: bash
        run: |
          mkdir -p update-feed
          # The in-app auto-updater reads these from the rolling `updates` tag, NOT the versioned
          # release page — so they go to a separate bucket and never clutter the release.
          find apps/desktop/artifacts -maxdepth 2 \
            \( -name '*-update.json' -o -name '*.patch' -o -name '*.tar.zst' \) \
            -exec cp {} update-feed/ \; || true

      - name: Build desktop app (dev bundle, for the verified-running smoke)
        id: smokebuild
        if: matrix.app
        shell: bash
        # EPHEMERAL TEST FIXTURE ONLY: this dev bundle is built AFTER staging and
        # written to apps/desktop/build (never stage/), so it is never uploaded. It
        # exists solely to give the smoke a directly-runnable bundle.
        # The channel build above ships a self-extracting installer on Linux/Windows
        # that the loose-bundle smoke can't launch ("Not a valid self-extracting
        # installer"), so verify the app runs against a directly-runnable dev bundle
        # (same app code → faithful runtime gate). Remove the channel bundle first so the
        # smoke deterministically launches THIS dev bundle. The channel bundle was only
        # built (never executed), so this `rm` is safe on Windows — unlike removing a
        # bundle whose launcher the smoke just ran (a still-held file lock → "Device or
        # resource busy"), which is why the dev build + smoke run LAST.
        run: |
          rm -rf apps/desktop/build
          bun run --filter spectrum build

      - name: Install Linux GUI runtime deps (xvfb + webkit2gtk + appindicator)
        if: matrix.app && runner.os == 'Linux'
        # Electrobun's libNativeWrapper.so dlopens the GTK/WebKit + app-indicator stack at startup
        # even with bundleCEF, so those runtime libs must be present or the app crashes
        # (ERR_DLOPEN_FAILED) before the proxy binds. xvfb provides the virtual display the GUI
        # smoke needs. The trailing `ldd` surfaces any still-unresolved wrapper deps up front so a
        # missing lib shows here instead of as an opaque smoke failure.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libwebkit2gtk-4.1-0 \
            libgtk-3-0 \
            libayatana-appindicator3-1 \
            librsvg2-2 \
            libnotify4
          LIB=$(find apps/desktop/build -name libNativeWrapper.so | head -1)
          if [ -n "$LIB" ]; then
            echo "== ldd $LIB =="
            ldd "$LIB" | (grep 'not found' && echo '::warning::libNativeWrapper.so has unresolved deps (above)' || echo 'all wrapper deps resolved')
          fi

      - name: Verified-running smoke (Linux)
        if: matrix.app && runner.os == 'Linux' && steps.smokebuild.outcome == 'success'
        run: xvfb-run -a bun run --filter spectrum smoke

      - name: Verified-running smoke (macOS/Windows)
        if: matrix.app && runner.os != 'Linux' && steps.smokebuild.outcome == 'success'
        run: bun run --filter spectrum smoke

      - name: Guard — buckets hold exactly the expected artifacts
        if: matrix.app
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          # The auto-update feed must exist (proves the channel build emitted update metadata).
          updates=(update-feed/*-update.json)
          if [ ${#updates[@]} -eq 0 ]; then
            echo "::error::No *-update.json in update-feed/ — the channel build emitted no update metadata."
            ls -la update-feed/ stage/ || true
            exit 1
          fi
          # The release page must hold ONLY the installer(s) + CLI archive — no feed leakage, no dev bundles.
          for f in stage/*; do
            case "$(basename "$f")" in
              *-cli.tar.gz|*-cli.zip|*.dmg|*-Setup.tar.gz|*-Setup*.zip) ;;
              *) echo "::error::Unexpected artifact staged for the release page: $f"; exit 1 ;;
            esac
          done
          echo "stage/ (release-page assets):"; ls -1 stage/
          echo "update-feed/:"; ls -1 update-feed/

      - name: Upload release-page assets
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: stage/*
          if-no-files-found: error

      - name: Upload auto-update feed
        if: matrix.app && steps.app.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: update-feed-${{ matrix.asset }}
          path: update-feed/*
          if-no-files-found: error

      - name: Clean up signing keychain
        if: always() && runner.os == 'macOS'
        shell: bash
        run: |
          [ -n "${SPECTRUM_SIGNING_KEYCHAIN:-}" ] && security delete-keychain "$SPECTRUM_SIGNING_KEYCHAIN" || true
          rm -f "$RUNNER_TEMP/asc-api-key.p8" || true

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download release-page assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: spectrum-*
          merge-multiple: true
      - name: Download auto-update feed
        uses: actions/download-artifact@v8
        with:
          path: update-feed
          pattern: update-feed-*
          merge-multiple: true
      - name: Checksums (release-page assets only)
        run: cd release-assets && sha256sum * > checksums-sha256.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes "Spectrum ${{ github.ref_name }} (${{ github.sha }})." \
            --target ${{ github.sha }} \
            release-assets/*

      - name: Publish update artifacts to rolling tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the rolling release exists, then clobber its update assets so the
          # baked baseUrl (.../releases/download/updates/) always serves the newest.
          gh release view updates >/dev/null 2>&1 || \
            gh release create updates \
              --title "Auto-update channel feed" \
              --notes "Rolling update metadata + patches. Managed by CI." \
              --prerelease
          shopt -s nullglob
          UPDATE_ASSETS=(update-feed/*-update.json update-feed/*.patch update-feed/*.tar.zst)
          if [ ${#UPDATE_ASSETS[@]} -gt 0 ]; then
            gh release upload updates "${UPDATE_ASSETS[@]}" --clobber
          fi
