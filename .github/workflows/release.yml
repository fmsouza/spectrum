name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test
      - run: bun audit

  build:
    name: Build (${{ matrix.name }})
    needs: gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            asset: spectrum-darwin-arm64
            archive: tar.gz
            app: true
          - name: macOS x64
            # macos-13 (Intel) was retired by GitHub on 2025-12-04; macos-15-intel
            # is the replacement x86_64 label (Intel support ends Fall 2027).
            os: macos-15-intel
            asset: spectrum-darwin-x64
            archive: tar.gz
            app: true
          - name: Linux x64
            os: ubuntu-latest
            asset: spectrum-linux-x64
            archive: tar.gz
            app: true
          - name: Linux arm64
            os: ubuntu-24.04-arm
            asset: spectrum-linux-arm64
            archive: tar.gz
            app: true
          - name: Windows x64
            os: windows-latest
            asset: spectrum-windows-x64
            archive: zip
            app: true
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile

      - name: Compile CLI binary
        run: bun run --filter spectrum compile

      - name: Build desktop app (stable channel, for distribution + update artifacts)
        id: app
        if: matrix.app
        # Hard gate: a release must ship a buildable channel bundle. Built on a clean
        # checkout (the dev/smoke build runs LAST, so build/ + artifacts/ here hold only
        # the channel outputs the staging steps publish — and no smoked-app file lock can
        # break a `rm`). Confirmed (Task 12): `--env=<channel>` selects the build
        # environment; build:stable runs `electrobun build --env=stable`, emitting
        # artifacts prefixed `stable-<os>-<arch>-…`.
        run: bun run --filter spectrum build:stable

      - name: Stage artifacts (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p stage
          cp apps/desktop/dist/spectrum-cli "stage/${{ matrix.asset }}-cli"
          if [ "${{ steps.app.outcome }}" = "success" ]; then
            tar czf "stage/${{ matrix.asset }}-app.tar.gz" -C apps/desktop/build .
            # Electrobun emits the per-OS installer (.dmg / .deb) into apps/desktop/artifacts
            # (the channel build's artifactFolder), alongside the build/ bundle.
            find apps/desktop/build apps/desktop/artifacts -maxdepth 3 \( -name '*.dmg' -o -name '*.deb' \) -exec cp {} "stage/" \;
          fi
          tar czf "stage/${{ matrix.asset }}-cli.tar.gz" -C stage "${{ matrix.asset }}-cli"
          rm -f "stage/${{ matrix.asset }}-cli"

      - name: Stage artifacts (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path stage | Out-Null
          Copy-Item "apps/desktop/dist/spectrum-cli.exe" "stage/${{ matrix.asset }}-cli.exe" -ErrorAction SilentlyContinue
          if (-not (Test-Path "stage/${{ matrix.asset }}-cli.exe")) {
            Copy-Item "apps/desktop/dist/spectrum-cli" "stage/${{ matrix.asset }}-cli.exe"
          }
          if ("${{ steps.app.outcome }}" -eq "success") {
            Compress-Archive "apps/desktop/build/*" "stage/${{ matrix.asset }}-app.zip"
          }
          Compress-Archive "stage/${{ matrix.asset }}-cli.exe" "stage/${{ matrix.asset }}-cli.zip"
          Remove-Item "stage/${{ matrix.asset }}-cli.exe"

      - name: Stage update artifacts
        if: matrix.app && steps.app.outcome == 'success'
        shell: bash
        run: |
          mkdir -p stage
          # Confirmed (Task 12): electrobun build writes the flat-named update artifacts
          # (update.json, .tar.zst, .patch) to `apps/desktop/artifacts/` (the config
          # `build.artifactFolder` default), not under `build/`. The build folder holds
          # only the intermediate app bundle. No separate command is needed.
          # Source: apps/desktop/node_modules/electrobun/src/cli/index.ts lines 4192-4236.
          find apps/desktop/artifacts -maxdepth 2 \
            \( -name '*-update.json' -o -name '*.patch' -o -name '*.tar.zst' \) \
            -exec cp {} stage/ \; || true

      - name: Build desktop app (dev bundle, for the verified-running smoke)
        id: smokebuild
        if: matrix.app
        shell: bash
        # The channel build above ships a self-extracting installer on Linux/Windows
        # that the loose-bundle smoke can't launch ("Not a valid self-extracting
        # installer"), so verify the app runs against a directly-runnable dev bundle
        # (same app code → faithful runtime gate). Remove the channel bundle first so the
        # smoke deterministically launches THIS dev bundle. The channel bundle was only
        # built (never executed), so this `rm` is safe on Windows — unlike removing a
        # bundle whose launcher the smoke just ran (a still-held file lock → "Device or
        # resource busy"), which is why the dev build + smoke run LAST.
        run: |
          rm -rf apps/desktop/build
          bun run --filter spectrum build

      - name: Install Linux GUI runtime deps (xvfb + webkit2gtk + appindicator)
        if: matrix.app && runner.os == 'Linux'
        # Electrobun's libNativeWrapper.so dlopens the GTK/WebKit + app-indicator stack at startup
        # even with bundleCEF, so those runtime libs must be present or the app crashes
        # (ERR_DLOPEN_FAILED) before the proxy binds. xvfb provides the virtual display the GUI
        # smoke needs. The trailing `ldd` surfaces any still-unresolved wrapper deps up front so a
        # missing lib shows here instead of as an opaque smoke failure.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libwebkit2gtk-4.1-0 \
            libgtk-3-0 \
            libayatana-appindicator3-1 \
            librsvg2-2 \
            libnotify4
          LIB=$(find apps/desktop/build -name libNativeWrapper.so | head -1)
          if [ -n "$LIB" ]; then
            echo "== ldd $LIB =="
            ldd "$LIB" | (grep 'not found' && echo '::warning::libNativeWrapper.so has unresolved deps (above)' || echo 'all wrapper deps resolved')
          fi

      - name: Verified-running smoke (Linux)
        if: matrix.app && runner.os == 'Linux' && steps.smokebuild.outcome == 'success'
        run: xvfb-run -a bun run --filter spectrum smoke

      - name: Verified-running smoke (macOS/Windows)
        if: matrix.app && runner.os != 'Linux' && steps.smokebuild.outcome == 'success'
        run: bun run --filter spectrum smoke

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: stage/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Checksums
        run: cd artifacts && sha256sum * > checksums-sha256.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes "Spectrum ${{ github.ref_name }} (${{ github.sha }})." \
            --target ${{ github.sha }} \
            artifacts/*

      - name: Publish update artifacts to rolling tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the rolling release exists, then clobber its update assets so the
          # baked baseUrl (.../releases/download/updates/) always serves the newest.
          gh release view updates >/dev/null 2>&1 || \
            gh release create updates \
              --title "Auto-update channel feed" \
              --notes "Rolling update metadata + patches. Managed by CI." \
              --prerelease
          shopt -s nullglob
          UPDATE_ASSETS=(artifacts/*-update.json artifacts/*.patch artifacts/*.tar.zst)
          if [ ${#UPDATE_ASSETS[@]} -gt 0 ]; then
            gh release upload updates "${UPDATE_ASSETS[@]}" --clobber
          fi
