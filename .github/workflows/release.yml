name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test
      - run: bun audit

  build:
    name: Build (${{ matrix.name }})
    needs: gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            asset: spectrum-darwin-arm64
            archive: tar.gz
            app: true
          - name: macOS x64
            # macos-13 (Intel) was retired by GitHub on 2025-12-04; macos-15-intel
            # is the replacement x86_64 label (Intel support ends Fall 2027).
            os: macos-15-intel
            asset: spectrum-darwin-x64
            archive: tar.gz
            app: true
          - name: Linux x64
            os: ubuntu-latest
            asset: spectrum-linux-x64
            archive: tar.gz
            app: true
          - name: Linux arm64
            os: ubuntu-24.04-arm
            asset: spectrum-linux-arm64
            archive: tar.gz
            app: true
          - name: Windows x64
            os: windows-latest
            asset: spectrum-windows-x64
            archive: zip
            app: true
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile

      - name: Compile CLI binary
        run: bun run --filter spectrum compile

      - name: Build desktop app (best-effort)
        id: app
        if: matrix.app
        # continue-on-error: true until verified-running smoke is green on every platform (Task 5.2)
        continue-on-error: true
        run: bun run --filter spectrum build

      - name: Install xvfb (Linux GUI smoke)
        if: matrix.app && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Verified-running smoke (Linux)
        if: matrix.app && runner.os == 'Linux' && steps.app.outcome == 'success'
        run: xvfb-run -a bun run --filter spectrum smoke

      - name: Verified-running smoke (macOS/Windows)
        if: matrix.app && runner.os != 'Linux' && steps.app.outcome == 'success'
        run: bun run --filter spectrum smoke

      - name: Stage artifacts (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p stage
          cp apps/desktop/dist/spectrum-cli "stage/${{ matrix.asset }}-cli"
          if [ "${{ steps.app.outcome }}" = "success" ]; then
            tar czf "stage/${{ matrix.asset }}-app.tar.gz" -C apps/desktop/build .
            # installer (Electrobun emits the per-OS installer under apps/desktop/build; record its path during the spike)
            find apps/desktop/build -maxdepth 3 \( -name '*.dmg' -o -name '*.deb' \) -exec cp {} "stage/" \;
          fi
          tar czf "stage/${{ matrix.asset }}-cli.tar.gz" -C stage "${{ matrix.asset }}-cli"
          rm -f "stage/${{ matrix.asset }}-cli"

      - name: Stage artifacts (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path stage | Out-Null
          Copy-Item "apps/desktop/dist/spectrum-cli.exe" "stage/${{ matrix.asset }}-cli.exe" -ErrorAction SilentlyContinue
          if (-not (Test-Path "stage/${{ matrix.asset }}-cli.exe")) {
            Copy-Item "apps/desktop/dist/spectrum-cli" "stage/${{ matrix.asset }}-cli.exe"
          }
          if ("${{ steps.app.outcome }}" -eq "success") {
            Compress-Archive "apps/desktop/build/*" "stage/${{ matrix.asset }}-app.zip"
          }
          Compress-Archive "stage/${{ matrix.asset }}-cli.exe" "stage/${{ matrix.asset }}-cli.zip"
          Remove-Item "stage/${{ matrix.asset }}-cli.exe"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: stage/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Checksums
        run: cd artifacts && sha256sum * > checksums-sha256.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes "Spectrum ${{ github.ref_name }} (${{ github.sha }})." \
            --target ${{ github.sha }} \
            artifacts/*
