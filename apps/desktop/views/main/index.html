<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      connect-src MUST permit ws://localhost:* — Electrobun's webview opens a WebSocket to
      ws://localhost:<dynamic-port> for its bun<->webview RPC bridge (electrobun/view → Electroview).
      Without it, `new Electroview()` throws a CSP SecurityError in its constructor and the React app
      never mounts (blank window). The rest of the policy stays hardened: no remote/eval scripts.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws://localhost:*; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    />
    <title>LaunchKit</title>
    <!-- Bundled locally next to app.js by the Electrobun build (same-origin = 'self'). -->
    <!-- Vendored xterm stylesheet first so the app theme partials can override it. -->
    <link rel="stylesheet" href="./xterm.css" />
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/controls.css" />
    <link rel="stylesheet" href="./styles/primitives.css" />
    <link rel="stylesheet" href="./styles/shell.css" />
    <link rel="stylesheet" href="./styles/sessions-master.css" />
    <link rel="stylesheet" href="./styles/sessions-detail.css" />
    <link rel="stylesheet" href="./styles/forms.css" />
    <link rel="stylesheet" href="./styles/modal.css" />
    <link rel="stylesheet" href="./styles/lists.css" />
    <link rel="stylesheet" href="./styles/page.css" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Bundled locally by the Electrobun build; no remote scripts, no eval. -->
    <script type="module" src="./app.js"></script>
  </body>
</html>
